repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        files: ^bkmonitor-admin/
      - id: end-of-file-fixer
        files: ^bkmonitor-admin/
      - id: check-yaml
        files: ^bkmonitor-admin/
      - id: check-json
        files: ^bkmonitor-admin/
      - id: check-merge-conflict
        files: ^bkmonitor-admin/
      - id: mixed-line-ending
        args: ['--fix=lf']
        files: ^bkmonitor-admin/

  - repo: local
    hooks:
      - id: pnpm-format-check
        name: pnpm format:check
        entry: bash -c 'cd bkmonitor-admin && pnpm format:check'
        language: system
        pass_filenames: false
        files: ^bkmonitor-admin/

      - id: pnpm-lint
        name: pnpm lint
        entry: bash -c 'cd bkmonitor-admin && pnpm lint'
        language: system
        pass_filenames: false
        files: ^bkmonitor-admin/

      - id: pnpm-typecheck
        name: pnpm typecheck
        entry: bash -c 'cd bkmonitor-admin && pnpm typecheck'
        language: system
        pass_filenames: false
        files: ^bkmonitor-admin/

      - id: pnpm-test
        name: pnpm test
        entry: bash -c 'cd bkmonitor-admin && pnpm test'
        language: system
        pass_filenames: false
        files: ^bkmonitor-admin/
