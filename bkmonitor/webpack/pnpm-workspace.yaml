packages:
  - src/*
  - '!packages/*'
  - '!**/bk-iframe/**'
  - '!**/bk-weweb/**'
  - '!**/mermaid/**'

allowBuilds:
  '@parcel/watcher': set this to true or false
  core-js: set this to true or false
  esbuild: set this to true or false
  protobufjs: set this to true or false
  simple-git-hooks: set this to true or false
  vue-demi: set this to true or false
  vuex-module-decorators: set this to true or false

modulesDir: node_modules

onlyBuiltDependencies:
  - '@biomejs/biome'
  - simple-git-hooks

overrides:
  '@blueking/open-telemetry': link:../../../../companyCode/bk-rum/packages/open-telemetry
  '@prometheus-io/lezer-promql': 0.305.0
  bk-magic-vue: 2.5.10-beta.18
  browserslist: ^4.28.1
  cross-spawn: ^7.0.6
  eslint: ^9.35.0
  monaco-editor: 0.44.0
  on-headers: ^1.1.0
  semver: ^7.7.2
  vue-class-component: ^7.2.6
  vue-property-decorator: ^9.1.2
  vue-tsx-support: ^3.2.0
  vuex-module-decorators: ^1.2.0

publicHoistPattern:
  - '!vue@'
  - '!vue-template-compiler'
  - '!vue-i18n'
  - '!@vue/compiler-sfc'

recursiveInstall: true
