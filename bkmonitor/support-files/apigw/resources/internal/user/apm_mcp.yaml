paths:
  /mcp/list_apm_applications/:
    get:
      operationId: list_apm_applications
      description: List APM applications in a business. Entry point for APM tracing workflow, used before get_apm_filter_fields and search_spans. Returns app_name list for subsequent queries. Similar to listing services in Jaeger. 获取业务下APM应用列表。APM链路追踪工作流的入口工具，在get_apm_filter_fields和search_spans前使用。返回app_name列表供后续查询。类似Jaeger的服务列表。
      tags:
      - apm_mcp
      parameters:
      - in: query
        name: bk_biz_id
        schema:
          type: string
        description: Business ID in BlueKing Monitor. 业务ID。
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: true
        matchSubpath: false
        enableWebsocket: false
        backend:
          name: default
          method: get
          path: /api/v4/apm_mcp/list_apm_application/
          matchSubpath: false
          timeout: 0
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: true
          resourcePermissionRequired: true
  /mcp/get_apm_filter_fields/:
    get:
      operationId: get_apm_filter_fields
      description: Get available filter fields for an APM app. Use after list_apm_applications to understand what filters can be used in search_spans. Returns field names like attributes.http.method, resource.service.name, etc. Helps build valid filters parameter. 获取APM应用的可用过滤字段。在list_apm_applications后使用，了解search_spans中可用的过滤条件。返回如attributes.http.method、resource.service.name等字段名。帮助构建有效的filters参数。
      tags:
      - apm_mcp
      parameters:
      - in: query
        name: bk_biz_id
        schema:
          type: string
        required: true
        description: Business ID in BlueKing Monitor. 业务ID。
      - in: query
        name: app_name
        schema:
          type: string
          default: 'Must be obtained from list_apm_applications. '
        required: true
        description: APM application name. Must be obtained from list_apm_applications. APM应用名称。必须从 list_apm_applications 获取。
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        enableWebsocket: false
        backend:
          name: default
          method: get
          path: /api/v4/apm_mcp/get_apm_search_filters/
          matchSubpath: false
          timeout: 0
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: true
          resourcePermissionRequired: true
  /mcp/search_spans/:
    post:
      operationId: search_spans
      description: Search spans in an APM app with filters and time range. Use after list_apm_applications. Returns span_id, trace_id for detail queries. Timestamps must be calculated dynamically. ⚠️ Query time span must NOT exceed 1 day (86400s). filters uses key/operator/value structure, get valid keys from get_apm_filter_fields. 查询APM应用的Span列表。在list_apm_applications后使用。返回span_id、trace_id供详情查询。时间戳需动态计算。⚠️查询跨度不得超过1天。 filters使用key/operator/value结构，有效key从get_apm_filter_fields获取。
      tags:
      - apm_mcp
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - app_name
              - end_time
              - bk_biz_id
              - start_time
              properties:
                sort:
                  type: array
                  default: '["-elapsed_time"]'
                  description: 'Sort conditions array. Each item is a field name, prefix with - for descending. Default: []. 排序条件数组。每项为字段名，前缀-表示降序。默认: []。'
                limit:
                  type: string
                  default: '10'
                  description: 'Maximum number of spans to return. Default: 10. 返回的最大Span数量。默认: 10。'
                query:
                  type: string
                  default: '""'
                  description: 'Query string for full-text search. Default: "". 全文搜索查询字符串。默认: ""。'
                offset:
                  type: string
                  default: '0'
                  description: 'Offset for pagination. Default: 0. 分页偏移量。默认: 0。'
                filters:
                  type: array
                  default: '// 示例 1：查询 POST 请求 {   "key": "attributes.http.method",   "operator": "equal",   "value": ["POST"],   "options": {"group_relation": "OR"} }  // 示例 2：查询 HTTP 状态码为 500 的请求 {   "key": "attributes.http.status_code",   "operator": "equal",   "value": ["500"] }'
                  description: 'Filter conditions array. Each filter has: key (field name from get_apm_filter_fields), operator (equal/not_equal/like/etc), value (array of values), options (optional, e.g., group_relation). Default: []. 过滤条件数组。每个filter包含: key(字段名,从get_apm_filter_fields获取), operator(equal/not_equal/like等), value(值数组), options(可选)。默认: []。'
                app_name:
                  type: string
                  description: APM application name. Must be obtained from list_apm_applications. APM应用名称。必须从 list_apm_applications 获取。
                end_time:
                  type: string
                  description: 'End timestamp in seconds (Unix). CRITICAL: Calculate current time dynamically! Python: int(time.time()), JavaScript: Math.floor(Date.now()/1000). NEVER use historical timestamps. 结束时间戳(秒)。关键:动态计算当前时间！ Python: int(time.time())。绝不使用历史时间戳。'
                bk_biz_id:
                  type: string
                  description: Business ID in BlueKing Monitor. 业务ID。
                start_time:
                  type: string
                  description: 'Start timestamp in seconds (Unix). MUST calculate dynamically! Python: int(time.time()) - 3600, JavaScript: Math.floor(Date.now()/1000) - 3600. DO NOT use fixed historical values. 开始时间戳(秒)。必须动态计算！ Python: int(time.time()) - 3600。不要用固定历史值。'
        required: false
        description: ''
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        enableWebsocket: false
        backend:
          name: default
          method: post
          path: /api/v4/apm_mcp/list_apm_span/
          matchSubpath: false
          timeout: 0
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: true
          resourcePermissionRequired: true
  /mcp/get_trace_detail/:
    post:
      operationId: get_trace_detail
      description: Get complete trace detail including all spans in the call chain. trace_id must be obtained from search_spans. Returns full trace tree with parent-child relationships, timing, and attributes. Use to analyze complete request flow. 获取完整Trace详情，包含调用链中的所有Span。trace_id必须从search_spans获取。返回包含父子关系、时序和属性的完整Trace树。用于分析完整请求流程。
      tags:
      - apm_mcp
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - app_name
              - trace_id
              - bk_biz_id
              properties:
                app_name:
                  type: string
                  description: APM application name. APM应用名称。
                trace_id:
                  type: string
                  description: Trace ID. Must be obtained from search_spans response. Trace ID。必须从 search_spans 返回结果获取。
                bk_biz_id:
                  type: string
                  description: Business ID in BlueKing Monitor. 业务ID。
        required: false
        description: ''
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        enableWebsocket: false
        backend:
          name: default
          method: post
          path: /api/v4/apm_mcp/query_apm_trace_detail/
          matchSubpath: false
          timeout: 0
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: true
          resourcePermissionRequired: true
  /mcp/get_span_detail/:
    post:
      operationId: get_span_detail
      description: Get detailed information of a single span. span_id must be obtained from search_spans or get_trace_detail. Returns complete span attributes, events, links, and resource info. Use to analyze specific operation details. 获取单个Span的详细信息。span_id必须从search_spans或get_trace_detail获取。返回完整的Span属性、事件、链接和资源信息。用于分析特定操作详情。
      tags:
      - apm_mcp
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - bk_biz_id
              - app_name
              - span_id
              properties:
                span_id:
                  type: string
                  description: Span ID. Must be obtained from search_spans or get_trace_detail. Span ID。必须从 search_spans 或 get_trace_detail 获取。
                app_name:
                  type: string
                  description: APM application name. APM应用名称。
                bk_biz_id:
                  type: string
                  description: Business ID in BlueKing Monitor. 业务ID。
        required: false
        description: ''
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        enableWebsocket: false
        backend:
          name: default
          method: post
          path: /api/v4/apm_mcp/query_apm_span_detail/
          matchSubpath: false
          timeout: 0
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: true
          resourcePermissionRequired: true
  /mcp/get_profile_application_service/:
    post:
      operationId: get_profile_application_service
      description: 'STEP 1 of the Profiling workflow. List APM applications & services that have continuous-profiling data under a business. Returns {normal: [{app_name, app_alias, application_id, services: [{name, sample_type, last_check_time, ...}]}], no_data: [...]}. Use BEFORE get_profile_type / get_profile_label / query_graph_profile to discover which (app_name, service_name) pairs actually have profile samples. Only items in "normal" with non-empty services have data; items in "no_data" do NOT. Profile 工作流第 1 步: 列出业务下已上报 Profile 数据的 APM 应用与服务。返回 normal(有数据)与 no_data(无数据)两个分组。在调用 get_profile_type / get_profile_label / query_graph_profile 之前必须先用本接口确定可用的 (app_name, service_name) 组合; 仅 normal 中且 services 非空的项才真正有 profile 样本。'
      tags:
      - apm_mcp
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - bk_biz_id
              properties:
                bk_biz_id:
                  type: integer
                  description: Business ID in BlueKing Monitor. 业务ID。
                is_get_ebpf:
                  type: boolean
                  default: false
                  description: Whether to additionally include eBPF (DeepFlow) profile services. Default false. 是否同时查询 eBPF (DeepFlow) Profile 服务, 默认 false。
        required: false
        description: ''
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        enableWebsocket: false
        backend:
          name: default
          method: post
          path: /api/v4/apm_mcp/get_profile_application_service/
          matchSubpath: false
          timeout: 0
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: true
          resourcePermissionRequired: true
  /mcp/get_profile_type/:
    post:
      operationId: get_profile_type
      description: 'STEP 2 of the Profiling workflow. Given an (app_name, service_name) pair, return the available profile data_types for that service plus the recommended default aggregation method. Response: {data_types: [{key, name, default_agg_method, is_large}], last_check_time, last_report_time, ...}. Use the returned data_types[].key as the data_type parameter for query_graph_profile, and default_agg_method as agg_method. PREREQUISITE: bk_biz_id/app_name/service_name must come from get_profile_application_service. Profile 工作流第 2 步: 查询某 (app_name, service_name) 的可用 profile 数据类型(如 cpu/nanoseconds、alloc_space/bytes 等)及其推荐聚合方法; 返回的 data_types[].key 用于后续 query_graph_profile 的 data_type 入参, default_agg_method 用作 agg_method。前置: bk_biz_id / app_name / service_name 必须来自 get_profile_application_service。'
      tags:
      - apm_mcp
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - bk_biz_id
              - app_name
              - service_name
              - start_time
              - end_time
              properties:
                bk_biz_id:
                  type: integer
                  description: Business ID in BlueKing Monitor. 业务ID。
                app_name:
                  type: string
                  description: APM application name. Must come from get_profile_application_service. APM 应用名称, 必须来自 get_profile_application_service。
                service_name:
                  type: string
                  description: Service name under the application. Must come from get_profile_application_service. 服务名称, 必须来自 get_profile_application_service。
                start_time:
                  type: integer
                  description: 'Start timestamp in seconds (Unix). MUST calculate dynamically! Python: int(time.time()) - 900 (15 min ago). 开始时间戳(秒), 必须动态计算, 例如 int(time.time())-900 表示近 15 分钟。'
                end_time:
                  type: integer
                  description: 'End timestamp in seconds (Unix). MUST calculate dynamically! Python: int(time.time()). 结束时间戳(秒), 必须动态计算, 例如 int(time.time())。'
                view_mode:
                  type: string
                  default: default
                  description: View mode, "default" returns full detail object, "sidebar" returns a flattened list for UI sidebar. Default "default". 返回模式, default(默认)返回完整详情对象, sidebar 返回侧边栏扁平列表。
        required: false
        description: ''
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        enableWebsocket: false
        backend:
          name: default
          method: post
          path: /api/v4/apm_mcp/get_profile_type/
          matchSubpath: false
          timeout: 0
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: true
          resourcePermissionRequired: true
  /mcp/get_profile_label/:
    post:
      operationId: get_profile_label
      description: 'STEP 3 (OPTIONAL) of the Profiling workflow. Returns the available profile label keys for a given service. Response: {label_keys: [...]}. Use these keys to construct the filter_labels parameter for query_graph_profile (e.g. {"profile_id": "xxx"}, {"endpoint": "/api/foo"}). Skip this step if you do not need to filter by label. PREREQUISITE: bk_biz_id/app_name/service_name must come from get_profile_application_service. Profile 工作流第 3 步(可选): 查询服务的 profile label keys, 返回 {label_keys:[...]}, 用于构造 query_graph_profile 的 filter_labels (如 {"profile_id":"xxx"} 定位某次 span 的 profile, 或 {"endpoint":"/api/foo"} 按接口过滤)。如不需要按 label 过滤可跳过此步骤。前置: bk_biz_id / app_name / service_name 必须来自 get_profile_application_service。'
      tags:
      - apm_mcp
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - bk_biz_id
              - app_name
              - service_name
              properties:
                bk_biz_id:
                  type: integer
                  description: Business ID in BlueKing Monitor. 业务ID。
                app_name:
                  type: string
                  description: APM application name. Must come from get_profile_application_service. APM 应用名称, 必须来自 get_profile_application_service。
                service_name:
                  type: string
                  description: Service name under the application. Must come from get_profile_application_service. 服务名称, 必须来自 get_profile_application_service。
                start_time:
                  type: integer
                  description: 'Start timestamp in seconds (Unix). MUST calculate dynamically! Python: int(time.time()) - 900 (15 min ago). 开始时间戳(秒), 必须动态计算, 例如 int(time.time())-900。'
                end_time:
                  type: integer
                  description: 'End timestamp in seconds (Unix). MUST calculate dynamically! Python: int(time.time()). 结束时间戳(秒), 必须动态计算, 例如 int(time.time())。'
                data_type:
                  type: string
                  default: cpu/nanoseconds
                  description: 'Profile sample type, e.g. cpu/nanoseconds, alloc_space/bytes. Default cpu/nanoseconds. Recommended to use a data_types[].key returned by get_profile_type. 采样类型, 默认 cpu/nanoseconds, 建议使用 get_profile_type 返回的 data_types[].key。'
                global_query:
                  type: boolean
                  default: false
                  description: Whether to query platform-level global storage (uploaded profiles). Default false. 是否查询平台全局存储 (上传的 profile 文件), 默认 false。
        required: false
        description: ''
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        enableWebsocket: false
        backend:
          name: default
          method: post
          path: /api/v4/apm_mcp/get_profile_label/
          matchSubpath: false
          timeout: 0
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: true
          resourcePermissionRequired: true
  /mcp/query_graph_profile/:
    post:
      operationId: query_graph_profile
      description: 'STEP 4 (FINAL) of the Profiling workflow. Query continuous-profiling flame-graph data in Grafana flame-graph (frame_data) format for an APM service. Response is a flat array of stack frames (level/value/self/label/...) directly consumable by Grafana flame-graph panels and easy for an LLM to walk to find hotspots. PREREQUISITES: (1) bk_biz_id/app_name/service_name must come from get_profile_application_service; (2) data_type & default agg_method should come from get_profile_type; (3) optionally use get_profile_label to discover label keys for filter_labels. ⚠️ Time span end_time - start_time MUST be <= 1800 seconds (30 min) — profiling is second-level sampling, larger windows cause payload explosion / LLM context overflow / downstream query timeout. UI default 15 min, recommended 5-30 min. Profile 工作流第 4 步(终结步骤): 查询 APM 服务的持续 Profile 火焰图数据, 返回 Grafana flame-graph 标准 frame_data 格式 (扁平的 level/value/self/label 帧数组), 可直接用于 Grafana 火焰图面板, 也便于 LLM 逐帧定位热点。前置: (1) bk_biz_id/app_name/service_name 来自 get_profile_application_service; (2) data_type 与 agg_method 建议来自 get_profile_type; (3) 如需按 label 过滤可先调 get_profile_label。⚠️查询时间跨度 end_time - start_time 必须 <= 1800 秒(30 分钟) — Profile 为秒级采样, 跨度过大会导致数据爆炸/LLM 上下文超限/下游查询超时。前端默认 15 分钟, 推荐 5-30 分钟。'
      tags:
      - apm_mcp
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - bk_biz_id
              - app_name
              - service_name
              - start_time
              - end_time
              properties:
                bk_biz_id:
                  type: integer
                  description: Business ID in BlueKing Monitor. 业务ID。
                app_name:
                  type: string
                  description: APM application name. Must come from get_profile_application_service. APM 应用名称, 必须来自 get_profile_application_service。
                service_name:
                  type: string
                  description: Service name under the application. Must come from get_profile_application_service. 服务名称, 必须来自 get_profile_application_service。
                start_time:
                  type: integer
                  description: 'Start timestamp in seconds (Unix). MUST calculate dynamically! Python: int(time.time()) - 900. ⚠️ end_time - start_time MUST be <= 1800 (30 min). 开始时间戳(秒), 必须动态计算, 例如 int(time.time())-900。⚠️ end_time - start_time 必须 <= 1800 秒(30 分钟)。'
                end_time:
                  type: integer
                  description: 'End timestamp in seconds (Unix). MUST calculate dynamically! Python: int(time.time()). ⚠️ end_time - start_time MUST be <= 1800 (30 min). 结束时间戳(秒), 必须动态计算, 例如 int(time.time())。⚠️ end_time - start_time 必须 <= 1800 秒(30 分钟)。'
                data_type:
                  type: string
                  default: cpu/nanoseconds
                  description: 'Profile sample type. Recommended to use a data_types[].key returned by get_profile_type. Common values: cpu/nanoseconds (CPU time), alloc_space/bytes (heap alloc size), alloc_objects/count, inuse_space/bytes (in-use memory), inuse_objects/count, goroutine/count. Default cpu/nanoseconds. 采样类型, 建议使用 get_profile_type 返回的 data_types[].key。常用: cpu/nanoseconds(CPU耗时)、alloc_space/bytes(堆分配字节)、alloc_objects/count(分配次数)、inuse_space/bytes(在用内存)、inuse_objects/count(在用对象数)、goroutine/count(协程数)。默认 cpu/nanoseconds。'
                agg_method:
                  type: string
                  description: 'Aggregation method across samples. "AVG" (average across the time window), "SUM" (sum across the time window), or "LAST" (keep only samples in the most recent aggregation interval, useful for instantaneous metrics like goroutine count / inuse_*). Recommended to use the default_agg_method returned by get_profile_type for the chosen data_type. If omitted, the backend picks a sensible default. 跨样本聚合方法: AVG(平均)/SUM(求和)/LAST(只保留最近一个聚合窗口, 适用于 goroutine、inuse_* 等瞬时型指标)。建议使用 get_profile_type 返回的 default_agg_method; 不传则后端按数据类型自动选择。'
                filter_labels:
                  type: object
                  default: '{}'
                  description: 'Profile label filters, e.g. {"profile_id":"xxx"} to inspect the profile of a specific span/trace, {"endpoint":"/api/foo"} to filter by endpoint. Use get_profile_label to discover available label keys. Default {}. profile 标签过滤, 例如 {"profile_id":"xxx"} 定位某次 span 的 profile, {"endpoint":"/api/foo"} 按接口过滤。可用的 label key 通过 get_profile_label 获取。默认 {}。'
                profile_id:
                  type: string
                  default: ''
                  description: Optional profile_id; convenience shortcut for filter_labels.profile_id, used to view the profile of a specific trace/span. 可选 profile_id, 等价于 filter_labels.profile_id, 用于查看某条 trace/span 对应的 profile。
                global_query:
                  type: boolean
                  default: false
                  description: Whether to query the platform-level global storage (uploaded profiles) instead of the application storage. Default false. 是否查询平台全局存储 (上传的 profile 文件) 而非应用存储, 默认 false。
                is_compared:
                  type: boolean
                  default: false
                  description: Whether to enable diff/compare mode (compare current window with another profile / label set). Default false. 是否开启对比模式 (与另一段 profile / label 进行 diff), 默认 false。
                diff_profile_id:
                  type: string
                  default: ''
                  description: Only used when is_compared=true. The other profile_id to compare against. 仅在 is_compared=true 时生效, 指定对比的另一个 profile_id。
                diff_filter_labels:
                  type: object
                  default: '{}'
                  description: Only used when is_compared=true. The other label-filter set to compare against. 仅在 is_compared=true 时生效, 对比侧的 label 过滤条件。
        required: false
        description: ''
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        enableWebsocket: false
        backend:
          name: default
          method: post
          path: /api/v4/apm_mcp/query_graph_profile/
          matchSubpath: false
          timeout: 0
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: true
          resourcePermissionRequired: true
  /mcp/calculate_by_range/:
    post:
      operationId: apm_mcp_calculate_by_range
      description: Calculate APM metrics by time range with comparison analysis. Supports request_total, success_rate, exception_rate, timeout_rate, avg/p50/p95/p99_duration. Enables multi-time-point comparison (e.g. day-over-day), group_by aggregation, growth rate and proportion calculation. app_name must be obtained from list_apm_applications. 按时间范围计算APM指标,支持多时间点对比(如日环比)、分组聚合、增长率和占比。app_name必须从list_apm_applications获取。
      tags:
      - apm_mcp
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - bk_biz_id
              - app_name
              - metric_group_name
              - metric_cal_type
              properties:
                bk_biz_id:
                  type: string
                  description: Business ID in BlueKing Monitor. 业务ID。
                app_name:
                  type: string
                  description: APM application name. Must be obtained from list_apm_applications. APM应用名称。必须从list_apm_applications获取。
                metric_group_name:
                  type: string
                  description: 'Metric group. Valid values: "trpc", "resource". 指标组。可选值:"trpc"、"resource"。'
                metric_cal_type:
                  type: string
                  description: 'Metric calculation type. Valid values: "request_total" (request count), "success_rate", "timeout_rate", "exception_rate", "avg_duration", "p50_duration", "p95_duration", "p99_duration". 指标计算类型。'
                start_time:
                  type: string
                  description: 'Start timestamp in seconds (Unix). MUST calculate dynamically! Python: int(time.time()) - 3600, JavaScript: Math.floor(Date.now()/1000) - 3600. DO NOT use fixed values. 开始时间戳(秒)。必须动态计算！ Python: int(time.time()) - 3600, JavaScript: Math.floor(Date.now()/1000) - 3600。不要用固定值。'
                end_time:
                  type: string
                  description: 'End timestamp in seconds (Unix). CRITICAL: Calculate dynamically! Python: int(time.time()), JavaScript: Math.floor(Date.now()/1000). NEVER use historical values. 结束时间戳(秒)。必须动态计算！ Python: int(time.time()), JavaScript: Math.floor(Date.now()/1000)。绝不使用历史值。'
                baseline:
                  type: string
                  default: 0s
                  description: 'Baseline time shift for growth rate calculation. Format: "0s" (current), "1h", "1d", "1w", "1M". Default: "0s". 增长率计算的基准时间偏移。默认:"0s"。'
                time_shifts:
                  type: array
                  default: '[]'
                  description: Time shift list for comparison. Max 2 comparison points. E.g. ["0s","1d"] for day-over-day. "0s" is auto-added if missing. 时间偏移列表,最多2个对比点。如["0s","1d"]表示日环比。
                filter_dict:
                  type: object
                  default: '{}'
                  description: Filter conditions dict. Merged with where conditions. 过滤条件字典。与where合并生效。
                where:
                  type: array
                  default: '[]'
                  description: 'Filter conditions list. Each item: {"key":"field","value":["val"],"method":"eq","condition":"and"}. method: eq/neq/include/exclude/reg. 过滤条件列表。'
                group_by:
                  type: array
                  default: '[]'
                  description: Group-by fields for dimension aggregation. E.g. ["callee_method","service_name"]. 分组字段列表。如["callee_method"]。
                options:
                  type: object
                  default: '{}'
                  description: Extra options. For trpc metrics, set options.trpc with kind ("caller"/"callee") and temporality ("cumulative"/"delta"). 额外配置。trpc指标需设置options.trpc,含kind和temporality。
        required: false
        description: ''
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        enableWebsocket: false
        backend:
          name: default
          method: post
          path: /api/v4/apm_metric_web/calculate_by_range/
          matchSubpath: false
          timeout: 0
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: true
          resourcePermissionRequired: true
  /mcp/list_apm_services/:
    post:
      operationId: list_apm_services
      description: List services under an APM application with service_language, observability system (SDK/temporality), log index-set relations, and optional Kubernetes workload links. Use after list_apm_applications. Optional service_names filters the result set; omit or empty for all real services (virtual nodes excluded). Helps correlate traces with logs and K8s. 查询APM应用下的服务列表，包含语言、系统信息（SDK与时间性）、日志索引集关联及可选K8s工作负载。在list_apm_applications后使用。可选service_names仅返回指定服务；不传或空列表返回应用下全部真实服务（不含虚拟节点）。用于关联链路与日志、K8s拓扑。
      tags:
      - apm_mcp
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - bk_biz_id
              - app_name
              properties:
                bk_biz_id:
                  type: string
                  description: Business ID in BlueKing Monitor. 业务ID。
                app_name:
                  type: string
                  description: APM application name. Must be obtained from list_apm_applications. APM应用名称。必须从 list_apm_applications 获取。
                service_names:
                  type: array
                  items:
                    type: string
                  default: '[]'
                  description: Optional service name list; when empty or omitted, returns all services under the app. 可选服务名列表；为空或不传则返回该应用下全部服务。
        required: false
        description: ''
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        enableWebsocket: false
        backend:
          name: default
          method: post
          path: /api/v4/service_web/service_list/
          matchSubpath: false
          timeout: 0
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: true
          resourcePermissionRequired: true
