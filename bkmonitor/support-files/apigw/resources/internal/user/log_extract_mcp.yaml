paths:
  /mcp/search_log_extract_hosts/:
    post:
      operationId: search_log_extract_hosts
      description: Query hosts accessible under log-extraction policies. Parameters and response follow the BK Log query-hosts API. 查询日志提取策略下可访问的主机，参数和返回值透传日志平台主机查询接口。
      tags: [log_extract_mcp]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [node_list]
              properties:
                all_scope: {type: boolean, default: false}
                scope_list:
                  type: array
                  items:
                    type: object
                    required: [scope_type, scope_id]
                    properties:
                      scope_type: {type: string, description: Scope type, normally biz.}
                      scope_id: {type: string, description: Business or scope ID.}
                node_list:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [object_id, instance_id]
                    properties:
                      object_id: {type: string}
                      instance_id: {type: integer}
                search_condition:
                  type: object
                  description: Host filters supported by BK Log, such as an exact ip.
                search_content: {type: string, description: Fuzzy host search content.}
                conditions:
                  type: array
                  items: {type: object}
                start: {type: integer, minimum: 0, default: 0}
                page_size: {type: integer, minimum: -1, maximum: 500, default: -1}
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        backend:
          name: default
          method: post
          path: /api/v4/log_extract/search_hosts/
          matchSubpath: false
          timeout: 30
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: false
          resourcePermissionRequired: true

  /mcp/search_log_extract_files/:
    post:
      operationId: search_log_extract_files
      description: Query extractable files on selected hosts. Parameters and response follow the BK Log list-file API. 查询可提取文件，参数和返回值透传日志平台文件查询接口。
      tags: [log_extract_mcp]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bk_biz_id, ip_list, path, is_search_child, time_range]
              properties:
                bk_biz_id: {type: integer, description: Business ID. 业务ID。}
                ip_list:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    description: Provide bk_host_id, or provide both ip and bk_cloud_id.
                    properties:
                      bk_host_id: {type: integer}
                      ip: {type: string}
                      bk_cloud_id: {type: integer}
                path: {type: string, description: Directory or file path to inspect. 查询路径。}
                is_search_child: {type: boolean, description: Search child directories recursively. 是否递归查询。}
                time_range: {type: string, enum: [1d, 1w, 1m, all, custom]}
                start_time: {type: string, description: Required for custom range, format YYYY-MM-DD HH:mm:ss.}
                end_time: {type: string, description: Required for custom range, format YYYY-MM-DD HH:mm:ss.}
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        backend:
          name: default
          method: post
          path: /api/v4/log_extract/search_files/
          matchSubpath: false
          timeout: 60
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: false
          resourcePermissionRequired: true

  /mcp/create_log_extract_task/:
    post:
      operationId: create_log_extract_task
      description: Create an asynchronous log-extraction task. This runs jobs on target hosts and MUST only be called after explicit user confirmation. Parameters and response follow the BK Log create-task API. 创建异步日志提取任务，参数和返回值透传日志平台任务创建接口。
      tags: [log_extract_mcp]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bk_biz_id, file_path, filter_type, filter_content, preview_directory, preview_ip_list, preview_time_range, preview_is_search_child]
              properties:
                bk_biz_id: {type: integer, description: Business ID. 业务ID。}
                target_node_type: {type: string, description: Target node type; defaults to INSTANCE in BK Log.}
                ip_list:
                  type: array
                  items: {type: object}
                target_nodes:
                  type: array
                  items: {type: object}
                file_path:
                  type: array
                  minItems: 1
                  items: {type: string}
                filter_type: {type: string, enum: ['', line_range, match_word, tail_line, match_range]}
                filter_content: {type: object}
                remark: {type: string, maxLength: 255}
                preview_directory: {type: string}
                preview_ip_list:
                  type: array
                  items: {type: object}
                preview_time_range: {type: string, enum: [1d, 1w, 1m, all, custom]}
                preview_start_time: {type: string}
                preview_end_time: {type: string}
                preview_is_search_child: {type: boolean}
                link_id: {type: integer, nullable: true, description: Extraction link ID; BK Log selects its default when omitted.}
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        backend:
          name: default
          method: post
          path: /api/v4/log_extract/create_task/
          matchSubpath: false
          timeout: 60
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: false
          resourcePermissionRequired: true

  /mcp/get_log_extract_task/:
    get:
      operationId: get_log_extract_task
      description: Get a log-extraction task. The response follows the BK Log task-detail API; inspect download_status to determine progress. 查询日志提取任务，返回值透传日志平台任务详情接口。
      tags: [log_extract_mcp]
      parameters:
      - {in: query, name: bk_biz_id, required: true, schema: {type: integer}, description: Business ID. 业务ID。}
      - {in: query, name: task_id, required: true, schema: {type: integer}, description: Log extraction task ID. 日志提取任务ID。}
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        backend:
          name: default
          method: get
          path: /api/v4/log_extract/get_task/
          matchSubpath: false
          timeout: 30
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: false
          resourcePermissionRequired: true

  /mcp/get_log_extract_download_url/:
    post:
      operationId: get_log_extract_download_url
      description: Get the download URL after the task becomes downloadable. The raw response follows BK Log; the URL is sensitive and must not be logged or fetched into model context. 获取任务下载地址，返回值透传日志平台下载接口。
      tags: [log_extract_mcp]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bk_biz_id, task_id]
              properties:
                bk_biz_id: {type: integer, description: Business ID. 业务ID。}
                task_id: {type: integer, description: Log extraction task ID. 日志提取任务ID。}
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        backend:
          name: default
          method: post
          path: /api/v4/log_extract/get_download_url/
          matchSubpath: false
          timeout: 30
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: false
          resourcePermissionRequired: true
