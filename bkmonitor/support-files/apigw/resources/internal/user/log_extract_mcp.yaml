paths:
  /mcp/list_log_extract_topology/:
    post:
      operationId: list_log_extract_topology
      description: List topology nodes that the current user may access through log-extraction policies. Use a returned node with search_log_extract_hosts when the user refers to a set or module. 查询当前用户在日志提取策略下可访问的拓扑；当用户提到集群或模块时，将返回的节点传给主机搜索工具。
      tags: [log_extract_mcp]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bk_biz_id]
              properties:
                bk_biz_id: {type: integer, description: Business ID. 业务ID。}
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        backend:
          name: default
          method: post
          path: /api/v4/log_extract/topology/
          matchSubpath: false
          timeout: 30
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: false
          resourcePermissionRequired: true

  /mcp/search_log_extract_hosts/:
    post:
      operationId: search_log_extract_hosts
      description: Query hosts accessible under log-extraction policies. Omit node_list to search from the authorized business root, or pass nodes returned by list_log_extract_topology. In the response, host_id/cloud_id are the bk_host_id/bk_cloud_id used by subsequent tools. 查询日志提取策略下可访问的主机；不传 node_list 时从授权业务根节点查询，也可传入拓扑工具返回的节点；返回结果中的 host_id/cloud_id 即后续工具使用的 bk_host_id/bk_cloud_id。
      tags: [log_extract_mcp]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bk_biz_id]
              properties:
                bk_biz_id: {type: integer, description: Business ID. 业务ID。}
                node_list:
                  type: array
                  minItems: 1
                  description: Optional authorized topology nodes returned by list_log_extract_topology. Omit to use the business root.
                  items:
                    type: object
                    required: [object_id, instance_id]
                    properties:
                      object_id: {type: string}
                      instance_id: {type: integer}
                search_content:
                  type: string
                  description: Fuzzy search across internal IPv4, internal IPv6, host name, operating-system type, and operating-system name. 对内网 IPv4、内网 IPv6、主机名、操作系统类型和操作系统名称进行模糊搜索。
                start: {type: integer, minimum: 0, default: 0}
                page_size: {type: integer, minimum: 1, maximum: 500, default: 20}
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        backend:
          name: default
          method: post
          path: /api/v4/log_extract/search_hosts/
          matchSubpath: false
          timeout: 30
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: false
          resourcePermissionRequired: true

  /mcp/list_log_extract_allowed_paths/:
    post:
      operationId: list_log_extract_allowed_paths
      description: List the directories and file types allowed by log-extraction policies for selected hosts, topology nodes, or a service template. Call this before search_log_extract_files; it does not execute a remote JOB. 查询所选主机、动态拓扑节点或服务模板的日志提取策略允许目录及文件类型；应在文件搜索前调用，本工具不会执行远程 JOB。
      tags: [log_extract_mcp]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bk_biz_id]
              properties:
                bk_biz_id: {type: integer, description: Business ID. 业务ID。}
                target_node_type:
                  type: string
                  enum: [INSTANCE, TOPO, SERVICE_TEMPLATE]
                  default: INSTANCE
                  description: INSTANCE accepts ip_list or host target_nodes; TOPO and SERVICE_TEMPLATE require target_nodes. INSTANCE 可传 ip_list 或主机节点，TOPO 和 SERVICE_TEMPLATE 必须传 target_nodes。
                ip_list:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    description: Provide bk_host_id, or provide both ip and bk_cloud_id.
                    properties:
                      bk_host_id: {type: integer}
                      ip: {type: string}
                      bk_cloud_id: {type: integer}
                target_nodes:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [bk_obj_id, bk_inst_id]
                    properties:
                      bk_obj_id: {type: string, enum: [biz, set, module, host, SERVICE_TEMPLATE]}
                      bk_inst_id: {type: integer}
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        backend:
          name: default
          method: post
          path: /api/v4/log_extract/allowed_paths/
          matchSubpath: false
          timeout: 30
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: false
          resourcePermissionRequired: true

  /mcp/search_log_extract_files/:
    post:
      operationId: search_log_extract_files
      description: This tool creates a real BK JOB and runs a file-discovery script on every selected host, waiting synchronously for up to 60 seconds. The script creates and removes temporary files under /tmp but does not modify the files being searched. Call list_log_extract_allowed_paths first, narrow the hosts and path, and avoid repeated exploratory calls. Each host discovers at most 500 files, while this tool returns only the latest 100 records across all selected hosts as {total, data, truncated}. If truncated is true, narrow the hosts, path, or time range instead of attempting pagination, because every call creates a new JOB. 本工具会创建真实的蓝鲸作业，在每台目标主机执行文件发现脚本，并同步等待最长 60 秒。脚本会在 /tmp 创建并清理临时文件，但不会修改被搜索的文件。请先调用 list_log_extract_allowed_paths 并缩小范围。每台主机最多发现 500 个文件，本工具仅返回全部目标中最新的 100 条，结构为 {total, data, truncated}；若 truncated 为 true，应进一步缩小主机、路径或时间范围，不要尝试翻页，因为每次调用都会创建新作业。
      tags: [log_extract_mcp]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bk_biz_id, ip_list, path, is_search_child, time_range]
              properties:
                bk_biz_id: {type: integer, description: Business ID. 业务ID。}
                ip_list:
                  type: array
                  minItems: 1
                  maxItems: 10
                  items:
                    type: object
                    description: Provide bk_host_id, or provide both ip and bk_cloud_id.
                    properties:
                      bk_host_id: {type: integer}
                      ip: {type: string}
                      bk_cloud_id: {type: integer}
                path: {type: string, description: Directory or file path to inspect. 查询路径。}
                is_search_child: {type: boolean, description: Search child directories recursively. 是否递归查询。}
                time_range: {type: string, enum: [1d, 1w, 1m, all, custom]}
                start_time: {type: string, description: Required for custom range, format YYYY-MM-DD HH:mm:ss.}
                end_time: {type: string, description: Required for custom range, format YYYY-MM-DD HH:mm:ss.}
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        backend:
          name: default
          method: post
          path: /api/v4/log_extract/search_files/
          matchSubpath: false
          timeout: 60
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: false
          resourcePermissionRequired: true

  /mcp/create_log_extract_task/:
    post:
      operationId: create_log_extract_task
      description: Create an asynchronous log-extraction task. This runs jobs on target hosts and MUST only be called after explicit user confirmation. Parameters and response follow the BK Log create-task API. 创建异步日志提取任务，参数和返回值透传日志平台任务创建接口。
      tags: [log_extract_mcp]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bk_biz_id, file_path, filter_type, filter_content, preview_directory, preview_ip_list, preview_time_range, preview_is_search_child]
              properties:
                bk_biz_id: {type: integer, description: Business ID. 业务ID。}
                target_node_type: {type: string, description: Target node type; defaults to INSTANCE in BK Log.}
                ip_list:
                  type: array
                  items: {type: object}
                target_nodes:
                  type: array
                  items: {type: object}
                file_path:
                  type: array
                  minItems: 1
                  items: {type: string}
                filter_type: {type: string, enum: ['', line_range, match_word, tail_line, match_range], description: Empty means no filtering. 空字符串表示不过滤。}
                filter_content:
                  type: object
                  description: "Parameters by filter_type: '' -> {}; line_range -> {start_line:int, end_line:int}; match_word -> {keyword:string, keyword_type:keyword_or|keyword_and|keyword_not}; tail_line -> {line_num:positive int}; match_range -> {start:string, end:string}. 各过滤类型按上述结构传参。"
                remark: {type: string, maxLength: 255}
                preview_directory: {type: string}
                preview_ip_list:
                  type: array
                  items: {type: object}
                preview_time_range: {type: string, enum: [1d, 1w, 1m, all, custom]}
                preview_start_time: {type: string}
                preview_end_time: {type: string}
                preview_is_search_child: {type: boolean}
                link_id: {type: integer, nullable: true, description: Extraction link ID; BK Log selects its default when omitted.}
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        backend:
          name: default
          method: post
          path: /api/v4/log_extract/create_task/
          matchSubpath: false
          timeout: 60
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: false
          resourcePermissionRequired: true

  /mcp/get_log_extract_task/:
    get:
      operationId: get_log_extract_task
      description: Get the stable polling state of a log-extraction task as {task_id, bk_biz_id, state, raw_state, terminal, downloadable, error}. state is one of pending, running, downloadable, failed, expired, or unknown. Stop polling when terminal is true, and call get_log_extract_download_url only when downloadable is true. 查询日志提取任务的稳定轮询状态，返回 {task_id, bk_biz_id, state, raw_state, terminal, downloadable, error}；state 为 pending、running、downloadable、failed、expired 或 unknown。terminal 为 true 时停止轮询，仅当 downloadable 为 true 时调用下载地址工具。
      tags: [log_extract_mcp]
      parameters:
      - {in: query, name: bk_biz_id, required: true, schema: {type: integer}, description: Business ID. 业务ID。}
      - {in: query, name: task_id, required: true, schema: {type: integer}, description: Log extraction task ID. 日志提取任务ID。}
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        backend:
          name: default
          method: get
          path: /api/v4/log_extract/get_task/
          matchSubpath: false
          timeout: 30
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: false
          resourcePermissionRequired: true

  /mcp/get_log_extract_download_url/:
    post:
      operationId: get_log_extract_download_url
      description: Get the raw download URL after the task becomes downloadable. The URL is returned as a normal MCP result and may enter the host or model context. Call this tool only after the user explicitly requests the download; avoid quoting, repeatedly requesting, or actively logging the URL. 任务可下载后获取原始下载地址。该地址会作为普通 MCP 结果返回，可能进入 Host 或模型上下文。仅在用户明确要求下载后调用，避免复述、重复请求或主动记录该地址。
      tags: [log_extract_mcp]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bk_biz_id, task_id]
              properties:
                bk_biz_id: {type: integer, description: Business ID. 业务ID。}
                task_id: {type: integer, description: Log extraction task ID. 日志提取任务ID。}
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        backend:
          name: default
          method: post
          path: /api/v4/log_extract/get_download_url/
          matchSubpath: false
          timeout: 30
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: false
          resourcePermissionRequired: true
