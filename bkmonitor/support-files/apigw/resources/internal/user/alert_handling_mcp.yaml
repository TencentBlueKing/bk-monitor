paths:
  /mcp/search_alarm_strategies/:
    post:
      operationId: search_alarm_strategies
      description: Search alarm strategies in one business by status, name, notice group, metric, label, action config, and other confirmed conditions. Use this as the discovery step before get_alarm_strategy, update_alarm_strategy, or strategy shield operations. 查询单个业务的告警策略。支持按状态、名称、告警组、指标、标签、处理套餐等条件过滤。作为策略详情、更新和策略屏蔽前的发现入口。
      tags:
      - alert_handling_mcp
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - bk_biz_id
              properties:
                bk_biz_id:
                  type: string
                  description: Business ID. Required for MCP authentication and business isolation. 业务ID，用于MCP鉴权和业务隔离。
                scenario:
                  type: string
                  description: Monitoring scenario, such as os, host_process, kubernetes, or uptimecheck. 监控场景。
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                    - key
                    - value
                    properties:
                      key:
                        type: string
                        description: Filter key. Common values include strategy_id, strategy_name, strategy_status, user_group_id, user_group_name, metric_id, metric_name, label_name, action_name, algorithm_type, and scenario. 筛选字段。
                      value:
                        type: array
                        items:
                          type: string
                        description: Values to match. 匹配值列表。
                  description: Strategy filter conditions. 策略过滤条件。
                page:
                  type: integer
                  default: 1
                  minimum: 1
                  description: Page number. 页码。
                page_size:
                  type: integer
                  default: 10
                  minimum: 1
                  description: Items per page. 每页条数。
                with_user_group:
                  type: boolean
                  default: false
                  description: Include notice group summaries. 是否补充告警组摘要。
                with_user_group_detail:
                  type: boolean
                  default: false
                  description: Include notice group details. 是否补充告警组详情。
                convert_dashboard:
                  type: boolean
                  default: true
                  description: Convert dashboard configuration in strategy results. 是否转换策略中的仪表盘配置。
        required: true
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        enableWebsocket: false
        backend:
          name: default
          method: post
          path: /api/v4/search_alert/search_alarm_strategies/
          matchSubpath: false
          timeout: 0
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: false
          resourcePermissionRequired: true
  /mcp/get_alarm_strategy/:
    post:
      operationId: get_alarm_strategy
      description: Get one alarm strategy by an exact strategy_id or strategy_name condition. A unique match returns the complete raw strategy plus microsecond-precision config_version for update_alarm_strategy; zero or multiple matches return candidate summaries. convert_dashboard defaults to false so query configs and internal IDs remain writable. 通过精确策略ID或名称获取单个策略。唯一命中返回完整原始配置及微秒精度config_version，供update_alarm_strategy并发校验；默认不转换仪表盘配置，以保留可写查询配置和内部ID。
      tags:
      - alert_handling_mcp
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - bk_biz_id
              - conditions
              properties:
                bk_biz_id:
                  type: string
                  description: Business ID. 业务ID。
                conditions:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                    - key
                    - value
                    properties:
                      key:
                        type: string
                        enum:
                        - strategy_id
                        - strategy_name
                        description: Exact strategy locator. 精确策略定位字段。
                      value:
                        type: array
                        minItems: 1
                        items:
                          type: string
                        description: Strategy IDs or names. 策略ID或名称列表。
                with_user_group:
                  type: boolean
                  default: true
                  description: Include notice group information. 是否补充告警组信息。
                with_user_group_detail:
                  type: boolean
                  default: false
                  description: Include full notice group details. 是否补充告警组详情。
                convert_dashboard:
                  type: boolean
                  default: false
                  description: Convert dashboard configuration. Keep false when the result will be submitted to update_alarm_strategy so raw query configs and internal IDs are preserved. 是否转换仪表盘配置；用于完整更新时保持false，以保留原始查询配置和内部ID。
        required: true
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        enableWebsocket: false
        backend:
          name: default
          method: post
          path: /api/v4/search_alert/get_alarm_strategy/
          matchSubpath: false
          timeout: 0
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: false
          resourcePermissionRequired: true
  /mcp/create_alarm_strategy/:
    post:
      operationId: create_alarm_strategy
      description: Create a single-metric alarm strategy after checking duplicate strategies with search_alarm_strategies and resolving notice_group_ids/action_config_ids from discovery tools. The simplified payload is converted to the complete strategy schema and validated before saving. This is a production write and requires explicit confirm=true. 创建单指标告警策略。创建前先查重并通过发现工具获取告警组和处理套餐ID。简化参数会转换为完整策略并在保存前校验。生产写操作，必须显式传confirm=true。
      tags:
      - alert_handling_mcp
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - bk_biz_id
              - name
              - scenario
              - metric
              - detect
              - notice_group_ids
              - confirm
              properties:
                bk_biz_id:
                  type: string
                  description: Business ID. 业务ID。
                name:
                  type: string
                  description: Strategy name. 策略名称。
                scenario:
                  type: string
                  description: Monitoring scenario, for example os, host_process, kubernetes, or uptimecheck. 监控场景。
                metric:
                  type: object
                  required:
                  - data_source_label
                  - data_type_label
                  - result_table_id
                  - metric_field
                  properties:
                    name:
                      type: string
                      description: Display name of the monitored item. 监控项名称。
                    data_source_label:
                      type: string
                      description: Data source label, for example bk_monitor, custom, bk_log_search, or bk_data. 数据来源标签。
                    data_type_label:
                      type: string
                      description: Data type, such as time_series, event, or log. 数据类型。
                    result_table_id:
                      type: string
                      description: Result table ID. 结果表ID。
                    metric_field:
                      type: string
                      description: Metric field. 指标字段。
                    agg_method:
                      type: string
                      default: AVG
                      description: Aggregation method. 聚合方法。
                    agg_interval:
                      type: integer
                      default: 60
                      description: Aggregation interval in seconds. 聚合周期，单位秒。
                    agg_dimension:
                      type: array
                      items:
                        type: string
                      description: Aggregation dimensions. 聚合维度。
                    agg_condition:
                      type: array
                      items:
                        type: object
                      description: Metric query conditions. 指标查询条件。
                    unit:
                      type: string
                      description: Metric unit. 指标单位。
                    alias:
                      type: string
                      default: a
                      description: Query alias. 查询别名。
                  description: Metric query definition. Additional data-source-specific fields may be provided. 指标查询定义，可补充数据源特有字段。
                detect:
                  type: object
                  required:
                  - level
                  - algorithm_type
                  - trigger_count
                  - check_window
                  properties:
                    level:
                      type: integer
                      enum:
                      - 1
                      - 2
                      - 3
                      description: Alert level, 1=fatal, 2=warning, 3=reminder. 告警级别。
                    algorithm_type:
                      type: string
                      description: Detection algorithm. Use Threshold for static thresholds. 检测算法，静态阈值使用Threshold。
                    method:
                      type: string
                      enum:
                      - gt
                      - gte
                      - lt
                      - lte
                      - eq
                      - neq
                      description: Comparison method required by Threshold. Threshold比较方法。
                    threshold:
                      description: Threshold value required by Threshold. Threshold阈值。
                      oneOf:
                      - type: number
                      - type: string
                    config:
                      description: Native algorithm config. Required for non-Threshold algorithms. 非Threshold算法必须提供的原生配置。
                    trigger_count:
                      type: integer
                      minimum: 1
                      description: Number of abnormal points required to trigger. 触发次数。
                    check_window:
                      type: integer
                      minimum: 1
                      description: Detection window count. 检测周期。
                    recovery_window:
                      type: integer
                      minimum: 1
                      description: Recovery window count; defaults to check_window. 恢复周期，默认与检测周期相同。
                    unit_prefix:
                      type: string
                      description: Algorithm display unit prefix. 算法单位前缀。
                    no_data_config:
                      type: object
                      description: No-data alarm configuration. 无数据告警配置。
                    target:
                      type: array
                      items:
                        type: array
                        items:
                          type: object
                      description: Monitoring target. Empty means all targets in the business. 监控目标，空数组表示业务全部目标。
                  description: Detection rule. Threshold requires method and threshold; other algorithms require config. 检测规则。
                notice_group_ids:
                  type: array
                  minItems: 1
                  items:
                    type: string
                  description: Notice group IDs from search_alarm_notice_groups. 从search_alarm_notice_groups获取的告警组ID。
                action_config_ids:
                  type: array
                  items:
                    type: string
                  description: Optional action config IDs from search_alarm_action_configs. 可选的处理套餐ID。
                labels:
                  type: array
                  items:
                    type: string
                  description: Strategy labels. 策略标签。
                is_enabled:
                  type: boolean
                  default: true
                  description: Whether the strategy is enabled after creation. 创建后是否启用。
                confirm:
                  type: boolean
                  enum:
                  - true
                  description: Explicit user confirmation for this production write. 生产写操作的用户显式确认，必须为true。
        required: true
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        enableWebsocket: false
        backend:
          name: default
          method: post
          path: /api/v4/search_alert/create_alarm_strategy/
          matchSubpath: false
          timeout: 0
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: false
          resourcePermissionRequired: true
  /mcp/update_alarm_strategy/:
    post:
      operationId: update_alarm_strategy
      description: Fully update one existing alarm strategy. You MUST first call get_alarm_strategy, preserve the complete returned configuration, internal IDs and config_version, modify only the requested fields, then submit with confirm=true. Query-derived metric_id is synchronized with changed PromQL/physical query fields while unchanged special metric IDs are preserved. A stale microsecond-precision config_version is rejected to prevent concurrent overwrite. This supports changing query_configs, expression, aggregation, algorithms, targets, detection rules, notice and actions; it never creates a missing strategy. 使用完整配置更新单个已有告警策略。必须先调用get_alarm_strategy，保留全部配置、内部ID和config_version，仅修改指定字段后提交。修改PromQL/物理查询字段时同步metric_id，未变更的特殊指标ID保持原值；旧config_version会被拒绝，且不会自动创建策略。
      tags:
      - alert_handling_mcp
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - bk_biz_id
              - id
              - name
              - type
              - source
              - scenario
              - is_enabled
              - is_invalid
              - invalid_type
              - items
              - detects
              - notice
              - actions
              - labels
              - app
              - path
              - priority
              - priority_group_key
              - metric_type
              - issue_config
              - update_time
              - config_version
              - confirm
              properties:
                bk_biz_id:
                  type: string
                  description: Business ID. Must match the strategy returned by get_alarm_strategy. 业务ID，必须与原策略一致。
                id:
                  type: string
                  description: Existing strategy ID from get_alarm_strategy. Required; this tool never creates a new strategy. 已有策略ID，必须来自get_alarm_strategy。
                name:
                  type: string
                  description: Complete strategy name. 完整策略名称。
                type:
                  type: string
                  default: monitor
                  description: Strategy type. 策略类型。
                source:
                  type: string
                  description: Strategy source. Preserve the current value. 策略来源，需保留原值。
                scenario:
                  type: string
                  description: Monitoring scenario. 监控场景。
                is_enabled:
                  type: boolean
                  description: Whether the strategy is enabled. 是否启用。
                is_invalid:
                  type: boolean
                  description: Whether the strategy is invalid. 是否失效。
                invalid_type:
                  type: string
                  description: Invalid reason/type. 失效类型。
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                    - id
                    - name
                    - query_configs
                    - algorithms
                    - no_data_config
                    - target
                    properties:
                      id:
                        type: string
                        description: Existing item ID. Preserve it from get_alarm_strategy. 监控项ID，需保留原值。
                      name:
                        type: string
                      expression:
                        type: string
                        description: Metric expression using query aliases. 指标计算表达式。
                      origin_sql:
                        type: string
                      functions:
                        type: array
                        items:
                          type: object
                      metric_type:
                        type: string
                      query_configs:
                        type: array
                        minItems: 1
                        items:
                          type: object
                          required:
                          - id
                          - alias
                          - data_source_label
                          - data_type_label
                          properties:
                            id:
                              type: string
                              description: Existing query config ID. Preserve it when editing. 查询配置ID。
                            alias:
                              type: string
                              description: Query alias referenced by expression. 查询别名。
                            data_source_label:
                              type: string
                            data_type_label:
                              type: string
                            metric_id:
                              type: string
                              description: Metric ID. 指标ID。
                            result_table_id:
                              type: string
                            metric_field:
                              type: string
                            promql:
                              type: string
                              description: PromQL query for Prometheus data sources. Prometheus数据源的PromQL。
                            agg_method:
                              type: string
                              description: Aggregation method such as AVG/MAX/SUM. 聚合方法。
                            agg_interval:
                              type: integer
                              description: Aggregation interval in seconds. 聚合周期（秒）。
                            agg_dimension:
                              type: array
                              items:
                                type: string
                            agg_condition:
                              type: array
                              items:
                                type: object
                            functions:
                              type: array
                              items:
                                type: object
                        description: Complete query configurations. Preserve data-source-specific fields not being changed. 完整查询配置，必须保留未修改的数据源特有字段。
                      algorithms:
                        type: array
                        items:
                          type: object
                        description: Complete detection algorithm configurations. 完整检测算法配置。
                      no_data_config:
                        type: object
                      target:
                        type: array
                        items:
                          type: array
                          items:
                            type: object
                  description: Complete monitoring items from get_alarm_strategy. 可修改query_configs、expression、聚合配置等，但需提交完整监控项。
                detects:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                    - id
                    - level
                    - trigger_config
                    - recovery_config
                    properties:
                      id:
                        type: string
                      level:
                        type: integer
                      expression:
                        type: string
                      connector:
                        type: string
                      trigger_config:
                        type: object
                      recovery_config:
                        type: object
                  description: Complete trigger and recovery rules. 完整触发与恢复规则。
                notice:
                  type: object
                  description: Complete notice configuration from get_alarm_strategy. 完整通知配置。
                actions:
                  type: array
                  items:
                    type: object
                  description: Complete action configurations; empty array is allowed. 完整处理套餐配置，可为空数组。
                labels:
                  type: array
                  items:
                    type: string
                app:
                  type: string
                path:
                  type: string
                priority:
                  type: integer
                  nullable: true
                priority_group_key:
                  type: string
                metric_type:
                  type: string
                issue_config:
                  type: object
                  nullable: true
                update_time:
                  type: string
                  description: Display update time returned by get_alarm_strategy. get_alarm_strategy返回的展示更新时间。
                config_version:
                  type: string
                  description: Microsecond-precision concurrency version from get_alarm_strategy. Stale values are rejected. get_alarm_strategy返回的微秒精度并发版本，旧值会被拒绝。
                confirm:
                  type: boolean
                  enum:
                  - true
                  description: Explicit user confirmation. 用户显式确认，必须为true。
        required: true
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        enableWebsocket: false
        backend:
          name: default
          method: post
          path: /api/v4/search_alert/update_alarm_strategy/
          matchSubpath: false
          timeout: 0
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: false
          resourcePermissionRequired: true
  /mcp/search_alarm_shields/:
    post:
      operationId: search_alarm_shields
      description: Search alarm shields in one business. Defaults to active shields. For a strategy-specific query, first resolve the strategy ID, request categories=["strategy"], then inspect shield_list[].dimension_config.strategy_id. 查询单个业务的告警屏蔽，默认查询生效中屏蔽。按策略查询时先定位策略ID，再查询strategy类型并检查返回的dimension_config.strategy_id。
      tags:
      - alert_handling_mcp
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - bk_biz_id
              properties:
                bk_biz_id:
                  type: string
                  description: Business ID. 业务ID。
                is_active:
                  type: boolean
                  default: true
                  description: Whether to return active shields. 是否查询生效中的屏蔽。
                order:
                  type: string
                  default: -id
                  enum:
                  - -id
                  - id
                  - begin_time
                  - -begin_time
                  - failure_time
                  - -failure_time
                  description: Sort field. 排序字段。
                categories:
                  type: array
                  items:
                    type: string
                    enum:
                    - scope
                    - strategy
                    - event
                    - alert
                    - dimension
                  description: Shield categories. 屏蔽类型列表。
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                    - key
                    - value
                    properties:
                      key:
                        type: string
                        description: Shield model field. description supports fuzzy matching; other fields use exact matching. Shield模型字段，description支持模糊查询。
                      value:
                        description: Filter value. 筛选值。
                  description: Shield model filters. 屏蔽过滤条件。
                time_range:
                  type: string
                  description: Time range in "start -- end" form. 时间范围。
                page:
                  type: integer
                  minimum: 1
                  description: Page number. 页码。
                page_size:
                  type: integer
                  minimum: 1
                  description: Items per page. 每页条数。
                source:
                  type: string
                  description: Shield source. 屏蔽来源。
        required: true
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        enableWebsocket: false
        backend:
          name: default
          method: post
          path: /api/v4/search_alert/search_alarm_shields/
          matchSubpath: false
          timeout: 0
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: false
          resourcePermissionRequired: true
  /mcp/get_alarm_shield/:
    get:
      operationId: get_alarm_shield
      description: Get one alarm shield by ID in a business. The ID must come from search_alarm_shields. 获取业务下单个告警屏蔽详情，ID必须来自search_alarm_shields。
      tags:
      - alert_handling_mcp
      parameters:
      - in: query
        name: bk_biz_id
        schema:
          type: string
        required: true
        description: Business ID. 业务ID。
      - in: query
        name: id
        schema:
          type: string
        required: true
        description: Shield ID from search_alarm_shields. 从search_alarm_shields获取的屏蔽ID。
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        enableWebsocket: false
        backend:
          name: default
          method: get
          path: /api/v4/search_alert/get_alarm_shield/
          matchSubpath: false
          timeout: 0
        pluginConfigs: []
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: false
          resourcePermissionRequired: true
  /mcp/create_alarm_shield/:
    post:
      operationId: create_alarm_shield
      description: Create an alarm shield. Supported categories are scope, strategy, alert, and dimension; event shields are not exposed because the backend has no safe event-to-alert mapping. First resolve the target and check for an existing active shield. For a strategy shield use category="strategy" and dimension_config.id=[strategy_id]. Times use "YYYY-MM-DD HH:mm:ss"; cycle type 1=once, 2=daily, 3=weekly, 4=monthly. Production write; confirm=true is required. 创建告警屏蔽。支持scope、strategy、alert、dimension；后端缺少安全的事件到告警映射，暂不开放event屏蔽。先定位目标并检查已有屏蔽。生产写操作，必须confirm=true。
      tags:
      - alert_handling_mcp
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - bk_biz_id
              - category
              - begin_time
              - end_time
              - shield_notice
              - dimension_config
              - confirm
              properties:
                bk_biz_id:
                  type: string
                  description: Business ID. 业务ID。
                category:
                  type: string
                  enum:
                  - scope
                  - strategy
                  - alert
                  - dimension
                  description: Shield category. 屏蔽类型。
                description:
                  type: string
                  description: Shield reason. 屏蔽原因。
                begin_time:
                  type: string
                  description: Start time in YYYY-MM-DD HH:mm:ss, interpreted in business timezone unless a timezone is included. 开始时间。
                end_time:
                  type: string
                  description: End time in YYYY-MM-DD HH:mm:ss, interpreted in business timezone unless a timezone is included. 结束时间。
                cycle_config:
                  type: object
                  required:
                  - type
                  properties:
                    type:
                      type: integer
                      enum:
                      - 1
                      - 2
                      - 3
                      - 4
                    begin_time:
                      type: string
                      description: Daily cycle start time, HH:mm:ss. 周期每日开始时间。
                    end_time:
                      type: string
                      description: Daily cycle end time, HH:mm:ss. 周期每日结束时间。
                    day_list:
                      type: array
                      items:
                        type: integer
                    week_list:
                      type: array
                      items:
                        type: integer
                  description: Cycle configuration. Omit for a one-time shield or use type=1. 周期配置。
                shield_notice:
                  type: boolean
                  description: Whether to send shield notifications. 是否发送屏蔽通知。
                notice_config:
                  type: object
                  required:
                  - notice_time
                  - notice_way
                  - notice_receiver
                  properties:
                    notice_time:
                      type: integer
                    notice_way:
                      type: array
                      minItems: 1
                      items:
                        type: string
